<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f9f9f9;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    a.button {
      display: inline-block;
      background: #222;
      color: #fff;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    a.button:hover {
      background: #444;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
<script>
  fetch('./version.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('version-footer').textContent =
        `v${data.version} · ${data.commit.slice(0, 7)}`;

      const changelog = document.getElementById('changelog');
      if (data.changes && data.changes.length > 0) {
        changelog.innerHTML = `
          <p style="font-size:0.8rem; color:#aaa; margin-top:0.5rem;">Changes:</p>
          <ul style="font-size:0.85rem; color:#666; text-align:left; padding-left:1.2rem;">
            ${data.changes.map(c => `<li>${c}</li>`).join('')}
          </ul>`;
      }
    })
    .catch(() => {
      document.getElementById('version-footer').textContent = 'dev';
    });
</script>
</head>
<body>

  <div class="card">
    <h1>Hello, world! 👋</h1>
    <p>This site is live on GitHub Pages. Edit <code>index.html</code> to make it your own.</p>
    <a class="button" href="https://github.com">View on GitHub</a>
  </div>

  <footer>Deployed with GitHub Actions</footer>

</body>

<footer id="version-footer">Deployed with GitHub Actions</footer>
<div id="changelog"></div>


</html>
